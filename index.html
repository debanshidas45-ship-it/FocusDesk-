<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>FouseDesk</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>🌲 FocusDesk</h1>

        <!-- TIMER DISPLAY -->
        <div class="time-input">
            <span id="display">00:00:00</span>
            <button onclick="editTime()">✏️</button>
        </div>

        <!-- EDIT BOX -->
        <div id="editBox" class="hidden">
            <div class="input-group">
                <input type="number" id="hours" placeholder="HH">
                <input type="number" id="minutes" placeholder="MM">
                <input type="number" id="seconds" placeholder="SS">
            </div>

            <button class="set-btn" onclick="setTimer()">Set Timer</button>
        </div>

        <button id="stopMusicBtn" class="hidden" onclick="stopMusic()">🔇 Stop Music</button>

        <!-- CONTROLS -->
        <div class="controls">
            <button onclick="pauseTimer()">Pause</button>
            <button onclick="resetTimer()">Reset</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
